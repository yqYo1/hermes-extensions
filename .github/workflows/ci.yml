name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  # Format check - must pass
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
      - name: Run treefmt
        run: nix fmt -- --fail-on-change --no-cache
  # Lint checks - parallelized via matrix
  lint:
    name: Lint (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - typos
          - basedpyright-latest
          - basedpyright-local
          - ty
          - markdownlint
          - yamllint
          - actionlint
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
      - name: Run ${{ matrix.check }}
        run: nix build .#checks.x86_64-linux.${{ matrix.check }}
        continue-on-error: ${{ matrix.check == 'ty' }}
  # Plugin tests — gated on plugins/loop-detector/ changes
  plugin-tests:
    name: Plugin Tests (loop-detector)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
      - name: Check for plugin changes
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          git diff --name-only "$BASE...HEAD" | grep -q '^plugins/loop-detector/' && \
            echo "changed=true" >> "$GITHUB_OUTPUT" || \
            echo "changed=false" >> "$GITHUB_OUTPUT"
      - name: Run plugin tests
        if: steps.changed.outputs.changed == 'true'
        run: nix build .#checks.x86_64-linux.plugin-tests-loop-detector
